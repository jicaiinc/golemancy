appId: ai.golemancy
productName: Golemancy
copyright: Copyright © 2026 Jicai, Inc.

directories:
  output: release
  buildResources: resources/build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/runtime
    to: runtime
    filter: ["**/*"]
  - from: resources/server
    to: server

asar: true
asarUnpack: []  # native modules are in extraResources, not in ASAR

mac:
  category: public.app-category.developer-tools
  icon: resources/build/icons/mac/icon.icns
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  entitlements: resources/build/entitlements.mac.plist
  entitlementsInherit: resources/build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "Golemancy needs microphone access for speech-to-text input."

dmg:
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

linux:
  target: [deb, rpm]
  category: Development
  icon: resources/build/icons/png
  artifactName: ${productName}-${version}-linux-${arch}.${ext}

win:
  target: [nsis]
  icon: resources/build/icons/win/icon.ico
  artifactName: ${productName}-${version}-win-${arch}.${ext}
