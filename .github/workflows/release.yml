# Build and release Golemancy for all supported platforms.
#
# Trigger: push a version tag (e.g., git tag v0.1.0 && git push --tags)
#
# Architecture:
#   Native modules (better-sqlite3) and bundled runtimes (Node.js, Python) are
#   platform-specific. Most platform+arch combos build on a matching runner.
#   macOS x64 cross-compiles on ARM runner (prebuilt binaries, Rosetta 2 for smoke test).
#
# Runner matrix:
#   macOS ARM64  → macos-latest  (Apple Silicon, native)
#   macOS x64    → macos-latest  (Apple Silicon, cross-compiled via --arch x64)
#   Linux x64    → ubuntu-latest
#   Windows x64  → windows-latest
#
# Cost estimate (private repo, per release):
#   macOS:   ~10 min × 2 runners × 10x multiplier = ~200 minutes
#   Linux:   ~10 min × 1 runner  × 1x multiplier  = ~10 minutes
#   Windows: ~10 min × 1 runner  × 2x multiplier  = ~20 minutes
#   Total: ~230 minutes (free tier: 2000 min/month → ~8 releases/month)

name: Release

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Minimum permissions — release job elevates as needed
permissions:
  contents: read

jobs:
  # ── Build Matrix ──────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            artifact: release-mac-arm64
          - os: macos-latest
            platform: mac
            arch: x64
            artifact: release-mac-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: release-linux-x64
          - os: windows-latest
            platform: win
            arch: x64
            artifact: release-win-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 0: Verify tag matches package.json version ──
      # Prevents releasing artifacts with mismatched version numbers.
      # Uses GITHUB_REF_NAME env var (safe — set by GitHub, not user input).
      - name: Verify version matches tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: package.json has $PKG_VERSION but tag is $TAG_VERSION"
            echo "Fix: Update apps/desktop/package.json version to $TAG_VERSION before tagging"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Linux: rpmbuild is required by electron-builder for .rpm target
      - name: Install rpmbuild (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 1: Download bundled runtimes (Node.js + Python) ──
      # Use --force in CI to ensure clean downloads (no stale cache from previous runs)
      - name: Download runtimes
        run: bash scripts/download-runtime.sh --arch ${{ matrix.arch }} --force
        shell: bash

      # ── Step 2: Build Electron app (main + preload + renderer) ──
      - name: Build (electron-vite)
        run: pnpm --filter @golemancy/desktop build

      # ── Step 3: Bundle server code + production dependencies ──
      - name: Bundle server
        run: node scripts/bundle-server.mjs --arch ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Preflight check ──
      - name: Preflight check
        run: node scripts/preflight-check.mjs --target ${{ matrix.platform }}

      # ── Step 5: Smoke test — fork server with bundled Node.js ──
      # Catches: missing packages, ABI mismatch, native load failures, entry corruption.
      # Server's index.ts has `if (process.send)` guard — safe without IPC parent.
      - name: Smoke test (bundled server)
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            BUNDLED_NODE="apps/desktop/resources/runtime/node/node.exe"
          else
            BUNDLED_NODE="apps/desktop/resources/runtime/node/bin/node"
          fi

          if [[ ! -x "$BUNDLED_NODE" ]]; then
            echo "ERROR: Bundled Node.js not found at $BUNDLED_NODE"
            exit 1
          fi

          # Fork server entry, wait for IPC ready or 15s timeout.
          # Timeout matches Electron main process (15s) to account for slow CI runners.
          # NODE_ENV=production is required — pino-pretty transport (dev-only) is not bundled.
          node -e "
            const { fork } = require('child_process');
            const child = fork('apps/desktop/resources/server/deps/index.js', [], {
              execPath: '$BUNDLED_NODE',
              env: { ...process.env, PORT: '0', NODE_ENV: 'production' },
              stdio: ['pipe', 'pipe', 'pipe', 'ipc'],
            });

            child.stdout.on('data', (d) => process.stdout.write(d));
            child.stderr.on('data', (d) => process.stderr.write(d));

            const timeout = setTimeout(() => {
              console.error('ERROR: Server did not send ready message within 15 seconds');
              child.kill();
              process.exit(1);
            }, 15000);

            child.on('message', (msg) => {
              if (msg && msg.type === 'ready') {
                console.log('Smoke test PASSED — server started on port ' + msg.port);
                clearTimeout(timeout);
                child.kill();
                process.exit(0);
              }
            });

            child.on('error', (err) => {
              console.error('ERROR: Server fork failed:', err.message);
              clearTimeout(timeout);
              process.exit(1);
            });

            child.on('exit', (code) => {
              if (code !== null && code !== 0) {
                console.error('ERROR: Server exited with code ' + code);
                clearTimeout(timeout);
                process.exit(1);
              }
            });
          "

      # ── Step 6: Package with electron-builder ──
      - name: Package (electron-builder)
        run: |
          cd apps/desktop
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          # Disable code signing (no Apple Developer / Windows cert)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Step 7: Verify package integrity ──
      # Every platform gets a verification step to catch corrupted artifacts
      # before they reach users. Previously only macOS had this.
      - name: Verify DMG integrity (macOS)
        if: matrix.platform == 'mac'
        run: |
          for dmg in apps/desktop/release/*.dmg; do
            echo "Verifying: $dmg"
            hdiutil verify "$dmg"
            echo "✓ $(basename "$dmg") is valid"
          done

      - name: Verify Linux packages
        if: matrix.platform == 'linux'
        run: |
          for deb in apps/desktop/release/*.deb; do
            echo "Verifying: $deb"
            dpkg-deb --info "$deb" > /dev/null
            SIZE=$(stat --format=%s "$deb")
            if [ "$SIZE" -lt 50000000 ]; then
              echo "WARNING: $deb is suspiciously small ($(numfmt --to=iec $SIZE))"
            fi
            echo "✓ $(basename "$deb") is valid ($(numfmt --to=iec $SIZE))"
          done
          for rpm_file in apps/desktop/release/*.rpm; do
            echo "Verifying: $rpm_file"
            rpm -qpl "$rpm_file" > /dev/null
            SIZE=$(stat --format=%s "$rpm_file")
            echo "✓ $(basename "$rpm_file") is valid ($(numfmt --to=iec $SIZE))"
          done

      - name: Verify Windows packages
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          # Only check top-level installer files — not files inside win-unpacked/
          $files = Get-ChildItem "apps/desktop/release" -File | Where-Object { $_.Extension -in '.exe','.msi' }
          if ($files.Count -eq 0) {
            Write-Error "ERROR: No .exe or .msi installer files found in apps/desktop/release/"
            exit 1
          }
          foreach ($file in $files) {
            $sizeMB = [math]::Round($file.Length / 1MB, 1)
            if ($sizeMB -lt 50) {
              Write-Error "ERROR: $($file.Name) is suspiciously small ($sizeMB MB) — expected >50 MB for a full Electron app"
              exit 1
            }
            Write-Host "✓ $($file.Name) — $sizeMB MB"
          }

      # ── Upload artifacts for release job ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
          if-no-files-found: error
          retention-days: 3

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          echo "Generated checksums:"
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Golemancy ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Golemancy ${{ github.ref_name }}

            ### Downloads

            #### macOS

            | File | Architecture | Note |
            |------|-------------|------|
            | `.dmg` (arm64) | Apple Silicon (M1/M2/M3/M4) | **Recommended** — ~80% of Mac users |
            | `.dmg` (x64) | Intel | For pre-2021 Macs |

            #### Windows

            | File | Note |
            |------|------|
            | `.exe` (NSIS installer) | **Recommended** — for most users |
            | `.msi` (Windows Installer) | For enterprise / IT deployment (Group Policy, SCCM) |

            #### Linux

            | File | Distros | Note |
            |------|---------|------|
            | `.deb` | Ubuntu, Debian, Mint | **Recommended** — ~80% of Linux desktop users |
            | `.rpm` | Fedora, RHEL, CentOS, openSUSE | |

            > **Not sure which to pick?** Choose the **Recommended** option — it covers the vast majority of users.

            ### Verify Downloads

            Download `SHA256SUMS.txt` and verify:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Installation Notes

            **macOS (unsigned):** Right-click the app → Open, or run:
            ```bash
            xattr -cr /Applications/Golemancy.app
            ```

            **Windows (unsigned):** Windows SmartScreen may warn — click "More info" → "Run anyway".

            **Linux (.deb) — Ubuntu, Debian, Mint:**
            ```bash
            sudo dpkg -i golemancy_*.deb
            ```

            **Linux (.rpm) — Fedora, RHEL, CentOS:**
            ```bash
            sudo dnf install golemancy-*.rpm
            ```

            > **Note:** Sandbox mode is only available on macOS and Linux.
            > Windows users should use Restricted or Unrestricted permission mode.

      # Clean up temporary build artifacts to free storage quota.
      # The files are already on the Release page — no longer needed in artifact storage.
      - name: Delete temporary build artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-*
